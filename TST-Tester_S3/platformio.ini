[platformio]
default_envs = TST-Tester-S3

[env:TST-Tester-S3]
platform = espressif32@6.12.0
; M5Stick S3 (StickS3) — ESP32-S3-PICO-1-N8R8, 8MB flash + 8MB PSRAM
; If M5Stack's platform package is installed, try: board = m5sticks3
; board = m5sticks3
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
; OPI PSRAM (qio_opi) disabled — causes watchdog crashes during SPI flash writes
; on ESP32-S3-PICO-1-N8R8. App fits comfortably in 512KB internal SRAM.
; board_build.arduino.memory_type = qio_opi

lib_deps =
    m5stack/M5Unified
    robtillaart/RunningAverage@^0.4.8
    robtillaart/RunningMedian@^0.3.7
    h2zero/NimBLE-Arduino@^1.4.1

lib_ignore =
    DFRobot_GP8XXX

[env:Calibration]
platform = espressif32@6.12.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_src_filter = +<*> -<main.cpp> +<../calibration/calibration.cpp>
; OPI PSRAM disabled — same reason as main env above
; board_build.arduino.memory_type = qio_opi

lib_deps =
    m5stack/M5Unified
    robtillaart/RunningAverage@^0.4.8

lib_ignore =
    DFRobot_GP8XXX
